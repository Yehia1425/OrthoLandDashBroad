<form [formGroup]="updateProductForm" (ngSubmit)="updateProduct()">

<div class="form-group">
<label>Product Id</label>
<input
  type="number"
  class="form-control"
  formControlName="id"
  [readonly]="isFromCard">
</div>

<div class="form-group">
<label>Price</label>
<input type="number" class="form-control" formControlName="price">
</div>

<div class="form-group">
<label>Category Id</label>
<input type="number" class="form-control" formControlName="categoryId"   [readonly]="isFromCard">

</div>

<div class="form-group">
<label>Stock</label>
<input type="number" class="form-control" formControlName="stock">
</div>

<div class="form-group">
<label>Description</label>
<input type="text" class="form-control" formControlName="description">
</div>

<div class="form-group">
<label>Rate</label>
<input type="number" class="form-control" formControlName="rate">
</div>

<button class="btn btn-primary mt-3">
Update Product
</button>

</form>


<div class="container mt-5 d-flex justify-content-center">
  <div class="card dashboard-card text-center p-4">
    
    <i class="fa-solid fa-house fa-3x text-primary"></i>
    
    <h4 class="mt-3">Back To Home</h4>
    <p class="text-muted">Return to the main dashboard page</p>

    <button routerLink="/home" class="btn btn-primary mt-2">
      Go Home
    </button>

  </div>
</div>
