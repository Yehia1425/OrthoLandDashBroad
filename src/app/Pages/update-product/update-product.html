

<form [formGroup]="updateProductForm" (ngSubmit)="updateProduct()">

<div class="form-group">
<label>Product Id</label>
<input type="number" class="form-control" placeholder="Product Id" formControlName="id">
</div>

<div class="form-group">
<label>Description</label>
<input type="text" class="form-control" placeholder="Description" formControlName="description">
</div>

<div class="form-group">
<label>Price</label>
<input type="number" placeholder="Price" class="form-control" formControlName="price">
</div>

<div class="form-group">
<label>Rate</label>
<input type="number" class="form-control" step="0.1" placeholder="Rate" formControlName="rate">
</div>

<div class="form-group">
<label>Stock</label>
<input type="number" class="form-control" placeholder="Stock" formControlName="stock">
</div>

<div class="form-group"> 
<label>Category Id</label>
<input type="number" class="form-control" placeholder="Category Id" formControlName="categoryId">
</div>



<button class="btn btn-primary mt-3">Create Product</button>

</form>
