<div class="container mt-5">
  <div class="row g-4">

    <!-- Create Product -->
    <div routerLink="/product" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-box-open fa-3x text-success"></i>
        <h4 class="mt-3">Create Product</h4>
        <button routerLink="/product" class="btn btn-success mt-3">Create</button>
      </div>
    </div>

    <!-- Update Product -->
    <div routerLink="/updateProduct"  class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-pen-to-square fa-3x text-warning"></i>
        <h4 class="mt-3">Update Product</h4>
        <button routerLink="/updateProduct" class="btn btn-warning mt-3">Update</button>
      </div>
    </div>

    <!-- Delete Product -->
    <div routerLink="/deleteProduct" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-trash fa-3x text-danger"></i>
        <h4 class="mt-3">Delete Product</h4>
        <button routerLink="/deleteProduct" class="btn btn-danger mt-3">Delete</button>
      </div>
    </div>

    <!-- Create Category -->
    <div routerLink="/createcategories" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-folder-plus fa-3x text-success"></i>
        <h4 class="mt-3">Create Category</h4>
        <button routerLink="/createcategories" class="btn btn-success mt-3">Create</button>
      </div>
    </div>

    <!-- Update Category -->
    <div  routerLink="/updatecategories" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-tags fa-3x text-warning"></i>
        <h4 class="mt-3">Update Category</h4>
        <button routerLink="/updatecategories" class="btn btn-warning mt-3">Update</button>
      </div>
    </div>

    <!-- Delete Category -->
    <div routerLink="/deletecategories" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-folder-minus fa-3x text-danger"></i>
        <h4 class="mt-3">Delete Category</h4>
        <button routerLink="/deletecategories" class="btn btn-danger mt-3">Delete</button>
      </div>
    </div>

    <!-- Create Offer -->
    <div routerLink="/createoffer" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-tag fa-3x text-success"></i>
        <h4 class="mt-3">Create Offer</h4>
        <button routerLink="/createoffer" class="btn btn-success mt-3">Create</button>
      </div>
    </div>

    <!-- Update Offer -->
    <div routerLink="/updateoffer" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-pen fa-3x text-warning"></i>
        <h4 class="mt-3">Update Offer</h4>
        <button routerLink="/updateoffer" class="btn btn-warning mt-3">Update</button>
      </div>
    </div>

    <!-- Delete Offer -->
    <div routerLink="/deleteoffer" class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="fa-solid fa-trash-can fa-3x text-danger"></i>
        <h4 class="mt-3">Delete Offer</h4>
        <button routerLink="/deleteoffer" class="btn btn-danger mt-3">Delete</button>
      </div>
    </div>

  </div>
</div>
