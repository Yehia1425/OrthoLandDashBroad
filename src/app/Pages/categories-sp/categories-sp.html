<section class="py-5 mt-5" >

  <div class="container">
    <div class="row g-4">

      @for (pro of categories(); track pro.id) {

      <div class="col-md-6 col-lg-4">

        <div 
        class="bg-primary p-4 rounded text-center shadow-sm h-100 category-card"
        [routerLink]="['/product', pro.id]">

          <div class="category-img-wrapper mb-3">

<img
  [src]="getImageUrl(pro.logoUrl)"
  [alt]="pro.name"
  class="category-img">

          </div>

          <h3 class="h5 fw-semibold mb-2 text-white">
            {{ pro.name }}
          </h3>

        </div>

      </div>

      }

    </div>
  </div>

</section>
