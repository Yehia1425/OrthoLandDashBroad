<div class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <!-- Card -->
        <div class="card bg-secondary bg-opacity-25 border-0 shadow-lg rounded-4 p-4">

          <!-- Header -->
          <div class="text-center mb-4">
            <h2 class="text-white fw-bold">Login</h2>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="login()">

            <!-- UserName -->
            <div class="form-floating mb-3">

              <input
                type="text"
                class="form-control form-control-lg rounded-3 bg-dark text-white border-0"
                placeholder="User Name"
                formControlName="userName"
                id="userName">

              <label for="userName">User Name</label>

              @if(loginForm.controls.userName.touched && loginForm.controls.userName.invalid){
                <small class="text-danger">User Name is required</small>
              }

            </div>

            <!-- Password -->
            <div class="form-floating mb-3">

              <input
                type="password"
                class="form-control form-control-lg rounded-3 bg-dark text-white border-0"
                placeholder="Password"
                formControlName="password"
                id="password">

              <label for="password">Password</label>

              @if(loginForm.controls.password.touched && loginForm.controls.password.invalid){
                <small class="text-danger">Password is required</small>
              }

            </div>

            <!-- Button -->
            <div class="d-grid mt-4">

              <button
                type="submit"
                class="btn btn-primary btn-lg rounded-3 fw-bold"
                [disabled]="loginForm.invalid">

                Login

              </button>

            </div>

          </form>

        </div>

      </div>
    </div>
  </div>

</div>
