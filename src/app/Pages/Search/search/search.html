<form [formGroup]="searchForm" (ngSubmit)="onSearch()">

<div class="input-group mb-4">

<input
type="text"
class="form-control"
placeholder="Search product..."
formControlName="search"
>

<button type="submit" class="btn btn-primary" (click)="onSearch()">
Search
</button>

</div>

</form>


<div class="container">

<div class="row g-4">

@for (pro of products; track $index) {

<div class="col-12 col-sm-6 col-md-4 col-lg-3">

<div class="card product-card h-100 shadow-sm">

<div class="img-holder d-flex justify-content-center align-items-center">

@if (pro?.picturesUrls?.length) {

<img
[src]="getImageUrl(pro.picturesUrls[0])"
class="product-img"
alt="product image"
/>

}

</div>

<div class="card-body">

<h5 class="card-title">
{{pro.name}}
</h5>

<p class="card-text text-muted">
{{pro.description}}
</p>

<p class="fw-bold text-success fs-5">
{{pro.price}} EGP
</p>

<div class="mb-2">

<span class="badge bg-primary me-2" *ngIf="pro.size">
Size: {{pro.size}}
</span>

<span class="badge bg-info text-dark" *ngIf="pro.color">
Color: {{pro.color}}
</span>

</div>

<p class="mb-1">
⭐ Rating: {{pro.rate}}
</p>

<p class="mb-1">
 Stock: {{pro.stock}}
</p>

<p class="mb-1">
Sold: {{pro.soldNumber}}
</p>

</div>

</div>

</div>

}

</div>

</div>
