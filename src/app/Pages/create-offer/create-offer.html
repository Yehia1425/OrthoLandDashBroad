<form [formGroup]="offerForm" (ngSubmit)="submitOffer()">

<div class="form-group">
<label>Buy Quantity</label>
<input type="number" class="form-control" formControlName="buyQuantity">
</div>

<div class="form-group">
<label>Get Quantity</label>
<input type="number" class="form-control" formControlName="getQuantity">
</div>

<div class="form-group">
<label>Start Date</label>
<input type="date" class="form-control" formControlName="startDate" readonly>
</div>

<div class="form-group">
<label>Duration Days</label>
<input type="number" class="form-control" formControlName="durationDays">
</div>

<!-- Category -->
<div class="form-group">

<label>Category</label>

<select
class="form-control"
formControlName="categoryId"
(change)="getProductsByCategory($any($event.target).value)"
>

<option value="">Select Category</option>

@for (cat of categories(); track cat.id) {

<option [value]="cat.id">
{{cat.name}}
</option>

}

</select>

</div>

<!-- Product -->
<div class="form-group">

<label>Product</label>

<select class="form-control" formControlName="productId">

<option value="">Select Product</option>

@for (pro of products(); track pro.id) {

<option [value]="pro.id">
{{pro.name}}
</option>

}

</select>

</div>

<button class="btn btn-primary mt-3 me-3">
Create Offer
</button>

</form>


<div class="container mt-5">
  <div class="row g-4">

    <!-- Update Offers Card -->
    <div routerLink="/updateoffer"  class="col-md-6">
      <div class="card custom-card h-100 text-center p-4">
        <div class="card-body">
          <i class="bi bi-tag-fill display-4 text-warning"></i>
          <h4 class="mt-3">Update Offers</h4>
          <p class="text-muted">Edit and update offers easily.</p>
          <button routerLink="/updateoffer" class="btn btn-warning px-4">
            Update Offers
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Offers Card -->
    <div routerLink="/deleteoffer" class="col-md-6">
      <div class="card custom-card h-100 text-center p-4">
        <div class="card-body">
          <i class="bi bi-trash-fill display-4 text-danger"></i>
          <h4 class="mt-3">Delete Offers</h4>
          <p class="text-muted">Remove offers from the system.</p>
          <button routerLink="/deleteoffer" class="btn btn-danger px-4">
            Delete Offers
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
