<form [formGroup]="updateOfferForm" (ngSubmit)="updateOffer()">

<div class="form-group">
<label>Offer Id</label>
<input type="number" class="form-control" formControlName="id">
</div>

<div class="form-group">
<label>Duration Days</label>
<input type="number" class="form-control" formControlName="durationDays">
</div>

<button class="btn btn-primary mt-3">Update Offer</button>

</form>
