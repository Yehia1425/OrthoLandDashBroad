<form [formGroup]="deleteForm" (ngSubmit)="deleteProduct()">

<!-- Categories -->
<div class="form-group">

<label>Category</label>

<select
class="form-control"
formControlName="categoryId"
(change)="getProductsByCategory()">

<option [ngValue]="null">Select Category</option>

@for (cat of categories; track cat.id) {

<option [ngValue]="cat.id">
{{cat.name}}
</option>

}

</select>

</div>


<!-- Products -->
<div class="form-group mt-3">

<label>Product</label>

<select
class="form-control"
formControlName="productId"
(change)="getProduct()">

<option [ngValue]="null">Select Product</option>

@for (product of products; track product.id) {

<option [ngValue]="product.id">
{{product.name}}
</option>

}

</select>

</div>




<button class="btn btn-danger mt-3">
Delete Product
</button>

</form>


<div class="container mt-5 d-flex justify-content-center">

<div class="card dashboard-card text-center p-4">

<i class="fa-solid fa-house fa-3x text-primary"></i>

<h4 class="mt-3">Back To Home</h4>

<p class="text-muted">
Return to the main dashboard page
</p>

<button routerLink="/home" class="btn btn-primary mt-2">
Go Home
</button>

</div>

</div>
