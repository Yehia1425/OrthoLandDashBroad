<form [formGroup]="deleteForm" (ngSubmit)="deleteProduct()">

<div class="form-group">
<label>Product Id</label>
<input type="number" class="form-control" formControlName="id">
</div>

<button class="btn btn-danger mt-3">Delete Product</button>

</form>

<div class="container mt-5 d-flex justify-content-center">
  <div class="card dashboard-card text-center p-4">
    
    <i class="fa-solid fa-house fa-3x text-primary"></i>
    
    <h4 class="mt-3">Back To Home</h4>
    <p class="text-muted">Return to the main dashboard page</p>

    <button routerLink="/home" class="btn btn-primary mt-2">
      Go Home
    </button>

  </div>
</div>
