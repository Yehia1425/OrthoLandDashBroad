<form [formGroup]="categoriesForm" (ngSubmit)="submitCategories()">

  <div class="form-group">
    <label>Name</label>
    <input type="text" class="form-control" formControlName="name">
  </div>

  <div class="form-group">
    <label>Logo URL</label>
    <input 
    type="file" 
    class="form-control"
    (change)="uploadImage($event)">
  </div>

  <div class="form-group mt-3">
    <label>Video</label>
    <input 
    type="file" 
    class="form-control"
    (change)="uploadVideo($event)">
  </div>

<button class="btn btn-primary mt-3 me-3">Create Categories</button>

</form>


<div class="container mt-5">
  <div class="row g-4">

    <div routerLink="/updatecategories" class="col-md-6">
      <div class="card custom-card h-100 text-center p-4">
        <div class="card-body">

          <i class="bi bi-tags display-4 text-warning"></i>
          <h4 class="mt-3">Update Categories</h4>
          <p class="text-muted">Edit and update categories easily.</p>

          <button routerLink="/updatecategories" class="btn btn-warning px-4">
            Update Categories
          </button>

        </div>
      </div>
    </div>

    <div routerLink="/deletecategories" class="col-md-6">
      <div class="card custom-card h-100 text-center p-4">
        <div class="card-body">

          <i class="bi bi-trash display-4 text-danger"></i>
          <h4 class="mt-3">Delete Categories</h4>
          <p class="text-muted">Remove categories from the system.</p>

          <button routerLink="/deletecategories" class="btn btn-danger px-4">
            Delete Categories
          </button>

        </div>
      </div>
    </div>

  </div>
</div>
