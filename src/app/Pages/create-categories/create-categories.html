<form [formGroup]="categoriesForm" (ngSubmit)="submitCategories()">

  <div class="form-group">
    <label>Name</label>
    <input type="text" class="form-control" formControlName="name">
  </div>

  <div class="form-group">
    <label>Logo URL</label>
    <input type="file" class="form-control" formControlName="logoUrl">
  </div>

<button class="btn btn-primary mt-3 me-3">Create Categories</button>
  <button routerLink="/updatecategories" class="btn btn-warning mt-3 me-3">Update Categories</button>
<button routerLink="/deletecategories" class="btn btn-danger mt-3 me-3">Delete Categories</button>

</form>
