<form [formGroup]="updateCategoryForm" (ngSubmit)="updateCategory()">

<div class="form-group">
<label>Category Id</label>
<input type="number" class="form-control" placeholder="Category Id" formControlName="id">
</div>

<div class="form-group">
<label>Category Name</label>
<input type="text" class="form-control" placeholder="Category Name" formControlName="name">
</div>

<button class="btn btn-primary mt-3">Update Category</button>

</form>
