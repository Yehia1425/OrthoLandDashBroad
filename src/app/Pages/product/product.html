<form [formGroup]="productForm" (ngSubmit)="submitProduct()">

<div class="form-group">
<label>Name</label>
<input type="text" class="form-control" formControlName="name">
</div>

<div class="form-group">
<label>Description</label>
<input type="text" class="form-control" formControlName="description">
</div>

<div class="form-group">
<label>Price</label>
<input type="number" class="form-control" formControlName="price">
</div>

<div class="form-group">
<label>Rate</label>
<input type="number" class="form-control" formControlName="rate">
</div>

<div class="form-group">
<label>Stock</label>
<input type="number" class="form-control" formControlName="stock">
</div>

<div class="form-group"> 
<label>Category Id</label>
<input type="number" class="form-control" formControlName="categoryId">
</div>

<div class="form-group">
<label>Picture 1</label>
<input type="file" class="form-control" formControlName="picture1">
</div>

<div class="form-group">
<label>Picture 2</label>
<input type="file" class="form-control" formControlName="picture2">
</div>

<div class="form-group">
<label>Picture 3</label>
<input type="file" class="form-control" formControlName="picture3">
</div>

<div class="">
<button class="btn btn-primary mt-3 me-3">Create Product</button>
<button routerLink="/updateProduct" class="btn btn-warning mt-3 me-3">Update Product</button>
<button routerLink="/deleteProduct" class="btn btn-danger mt-3 me-3">Delete Product</button>
</div>

</form>
