<form [formGroup]="productForm" (ngSubmit)="submitProduct()">

<div class="form-group">
<label>Name</label>
<input type="text" class="form-control" formControlName="name">
</div>

<div class="form-group">
<label>Description</label>
<input type="text" class="form-control" formControlName="description">
</div>

<div class="form-group">
<label>Price</label>
<input type="number" class="form-control" formControlName="price">
</div>

<div class="form-group">
<label>Rate</label>
<input type="number" class="form-control" formControlName="rate">
</div>

<div class="form-group">
<label>Stock</label>
<input type="number" class="form-control" formControlName="stock">
</div>

<div class="form-group">
<label>Size</label>
<input type="text" class="form-control" formControlName="size">
</div>

<div class="form-group">
<label>Color</label>
<input type="text" class="form-control" formControlName="color">
</div>

<div class="form-group">
<label>Type</label>
<select class="form-control" formControlName="type">
  <option value="">No Type</option>
  <option value="niti">Niti</option>
  <option value="stst">Stst</option>
</select>
</div>

<div class="form-group">
<label>Category</label>

<select class="form-control" formControlName="categoryId">

<option value="">Select Category</option>

@for (cat of categories(); track cat.id) {

<option [value]="cat.id">
{{ cat.name }}
</option>

}

</select>

</div>

<div class="form-group">
<label>Picture 1</label>
<input type="file" class="form-control" (change)="uploadImage($event,'picture1')" />
</div>

<div class="form-group">
<label>Picture 2</label>
<input type="file" class="form-control" (change)="uploadImage($event,'picture2')" />
</div>

<div class="form-group">
<label>Picture 3</label>
<input type="file" class="form-control" (change)="uploadImage($event,'picture3')" />
</div>

<div class="form-group">
<label>Picture 4</label>
<input type="file" class="form-control" (change)="uploadImage($event,'picture4')" />
</div>

<div class="form-group">
<label>Picture 5</label>
<input type="file" class="form-control" (change)="uploadImage($event,'picture5')" />
</div>

<button class="btn btn-primary mt-3 me-3">
Create Product
</button>

</form>


<div class="container mt-5">
  <div class="row g-4">

    <div routerLink="/updateProduct" class="col-md-6">
      <div class="card custom-card h-100 text-center p-4">
        <div class="card-body">
          <i class="bi bi-tags display-4 text-warning"></i>
          <h4 class="mt-3">Update Product</h4>
          <p class="text-muted">Edit and update product easily.</p>
          <button routerLink="/updateProduct" class="btn btn-warning px-4">
            Update Product
          </button>
        </div>
      </div>
    </div>

    <div routerLink="/deleteProduct" class="col-md-6">
      <div class="card custom-card h-100 text-center p-4">
        <div class="card-body">
          <i class="bi bi-trash display-4 text-danger"></i>
          <h4 class="mt-3">Delete Product</h4>
          <p class="text-muted">Remove product from the system.</p>
          <button routerLink="/deleteProduct" class="btn btn-danger px-4">
            Delete Product
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
